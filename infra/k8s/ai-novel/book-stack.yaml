    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: web
    app.kubernetes.io/instance: ai-novel
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-novel
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: lucky
  rules:
    - host: book.luckydcms.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-novel-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-novel-web
                port:
                  name: http
