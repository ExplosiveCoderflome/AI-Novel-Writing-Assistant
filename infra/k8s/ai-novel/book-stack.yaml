apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-novel-api-config
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/managed-by: trellis
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
data:
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: "3000"
  CORS_ORIGIN: https://book.luckydcms.com
  RAG_ENABLED: "true"
  EMBEDDING_PROVIDER: siliconflow
  EMBEDDING_MODEL: BAAI/bge-m3
  QDRANT_URL: http://ai-novel-qdrant:6333
  LLM_TIMEOUT_MS: "600000"
  IMAGE_STORAGE_DRIVER: s3
  IMAGE_STORAGE_ROOT: storage/generated-images
  IMAGE_STORAGE_S3_REGION: us-east-1
  IMAGE_STORAGE_S3_FORCE_PATH_STYLE: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-novel-qdrant-storage
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: qdrant
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-novel-generated-images
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-novel-api
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-novel
      app.kubernetes.io/component: api
      app.kubernetes.io/instance: ai-novel
  template:
    metadata:
      annotations:
        ai-novel/config-revision: "2026-04-16-rag-enable-1"
      labels:
        app.kubernetes.io/name: ai-novel
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ai-novel
        app.kubernetes.io/instance: ai-novel
        app.kubernetes.io/environment: production
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-registry
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: migrate
          image: hub.luckydcms.com/library/ai-novel-api:a7d3f50-20260422-171322
          imagePullPolicy: IfNotPresent
          command: ["node", "/app/server/node_modules/prisma/build/index.js", "migrate", "deploy", "--config", "/app/server/prisma.config.ts"]
          envFrom:
            - configMapRef:
                name: ai-novel-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-novel-db-secrets
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
      containers:
        - name: api
          image: hub.luckydcms.com/library/ai-novel-api:a7d3f50-20260422-171322
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ai-novel-api-config
          env:
            - name: RAG_CONFIG_VERSION
              value: "2026-04-16-rag-enable-1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-novel-db-secrets
                  key: DATABASE_URL
            - name: IMAGE_STORAGE_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ai-novel-minio-secrets
                  key: MINIO_ENDPOINT
            - name: IMAGE_STORAGE_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: ai-novel-minio-secrets
                  key: MINIO_BUCKET
            - name: IMAGE_STORAGE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ai-novel-minio-secrets
                  key: MINIO_ACCESS_KEY
            - name: IMAGE_STORAGE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-novel-minio-secrets
                  key: MINIO_SECRET_KEY
            - name: SILICONFLOW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-novel-rag-secrets
                  key: SILICONFLOW_API_KEY
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: generated-images
              mountPath: /app/storage/generated-images
      volumes:
        - name: generated-images
          persistentVolumeClaim:
            claimName: ai-novel-generated-images
---
apiVersion: v1
kind: Service
metadata:
  name: ai-novel-api
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  selector:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: api
    app.kubernetes.io/instance: ai-novel
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-novel-qdrant
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: qdrant
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-novel
      app.kubernetes.io/component: qdrant
      app.kubernetes.io/instance: ai-novel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-novel
        app.kubernetes.io/component: qdrant
        app.kubernetes.io/part-of: ai-novel
        app.kubernetes.io/instance: ai-novel
        app.kubernetes.io/environment: production
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-registry
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: qdrant
          image: hub.luckydcms.com/library/ai-novel-qdrant:v1.15.4-20260416-amd64
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: ai-novel-qdrant-storage
---
apiVersion: v1
kind: Service
metadata:
  name: ai-novel-qdrant
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: qdrant
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  selector:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: qdrant
    app.kubernetes.io/instance: ai-novel
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-novel-qdrant-ingress
  namespace: etl
  labels:
    app.kubernetes.io/name: ai-novel
    app.kubernetes.io/component: qdrant
    app.kubernetes.io/part-of: ai-novel
    app.kubernetes.io/instance: ai-novel
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-novel
      app.kubernetes.io/component: qdrant
      app.kubernetes.io/instance: ai-novel
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ai-novel
              app.kubernetes.io/component: api
              app.kubernetes.io/instance: ai-novel
      ports:
        - protocol: TCP
          port: 6333
---
